<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jokenpô</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg"></div>

<div class="game">
<h1 class="title">✊ Jokenpô</h1>

<div class="buttons">
<button class="choice" onclick="play('Pedra')">
<img src="img/pedra.png">
<p>Pedra</p>
</button>

<button class="choice" onclick="play('Papel')">
<img src="img/papel.png">
<p>Papel</p>
</button>

<button class="choice" onclick="play('Tesoura')">
<img src="img/tesoura.png">
<p>Tesoura</p>
</button>
</div>

<div class="battle">
<div class="player">
<div class="player">
    <h2>Você</h2>
    <img id="user" class="hand-img" src="img/pedra.png">
</div>

<div class="player">
    <h2>IA</h2>
    <img id="bot" class="hand-img" src="img/pedra.png">
</div>



</div>
</div>
</div>

<div class="result" id="result">Escolha uma jogada.</div>

<div class="scoreboard">
<div class="score">Vitórias: <span id="w">0</span></div>
<div class="score">Derrotas: <span id="l">0</span></div>
<div class="score">Empates: <span id="d">0</span></div>
</div>

<a class="back" href="index.html"><button class="action">⬅ Voltar</button></a>
</div>

<script src="jokenpo.js"></script>
</body>
</html>
